name: Send Invoice Email
description: Downloads the pre-committed invoice PDF from the repository and emails it to the client via Mailgun, then closes the issue.

inputs:
  issue-body:
    description: Raw body of the GitHub issue containing invoice fields
    required: true
  issue-number:
    description: GitHub issue number (used as the invoice number)
    required: true
  github-token:
    description: GitHub token with issues:write and contents:read permissions
    required: true
  mailgun-api-key:
    description: Mailgun private API key
    required: true
  mailgun-domain:
    description: Mailgun sending domain (e.g. mg.yourcompany.com)
    required: true
  company-name:
    description: Company name used in the email signature
    required: true

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install npm packages
      shell: bash
      run: npm install
      working-directory: ${{ github.action_path }}

    - name: Send invoice email
      shell: bash
      run: node ${{ github.action_path }}/send-email.js
      env:
        ISSUE_BODY:        ${{ inputs.issue-body }}
        ISSUE_NUMBER:      ${{ inputs.issue-number }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_TOKEN:      ${{ inputs.github-token }}
        MAILGUN_API_KEY:   ${{ inputs.mailgun-api-key }}
        MAILGUN_DOMAIN:    ${{ inputs.mailgun-domain }}
        COMPANY_NAME:      ${{ inputs.company-name }}